# JARVIS Configuration File
# This file contains application settings that can be modified without changing code

# Model Settings
models:
  live: "models/gemini-2.5-flash-native-audio-preview-12-2025"
  text: "gemini-2.5-flash"
  vision: "gemini-2.5-flash"
  voice_name: "Charon"
  context_window: 1000000  # Maximum context window in tokens (1M for gemini-2.5)

# Optional centralized model routing. If omitted, Jarvis falls back to the
# legacy models.text / models.vision values above.
model_router:
  cost_mode: "balanced"              # economy | balanced
  long_context_chars: 40000
  aliases:
    fast: "fast"
    reasoning: "reasoning"
    vision: "vision"
    long_context: "long_context"
    local: "local"
    local_code: "local_code"
    local_review: "local_review"
  models:
    local_code:
      provider: "ollama"
      model_id: "llama3.1"
      capabilities: ["text", "code", "reasoning", "summary"]
      context_window: 16384
      cost_tier: "free"
      latency_tier: "medium"
      enabled: true
    local_review:
      provider: "ollama"
      model_id: "llama3.1"
      capabilities: ["text", "code", "summary"]
      context_window: 16384
      cost_tier: "free"
      latency_tier: "medium"
      enabled: true
  fallbacks:
    fast: ["reasoning", "local"]
    reasoning: ["fast", "local"]
    vision: ["reasoning", "fast", "local"]
    long_context: ["reasoning", "fast", "local"]
    local_code: ["reasoning", "fast"]
    local_review: ["reasoning", "fast"]

# Audio Settings
audio:
  channels: 1
  send_sample_rate: 16000
  receive_sample_rate: 24000
  chunk_size: 1024

# Local LLM Fallback (Ollama)
ollama:
  enabled: false
  
  base_url: "http://localhost:11434"
  model: "llama3.1"
  fallback_only: true  # If true, only use when Gemini fails
  auto_start: true  # Automatically start Ollama server if enabled

# Passive Vision System
passive_vision:
  enabled: true
  interval_seconds: 30  # How often to capture screen
  memory_minutes: 10    # How long to keep visual memory
  storage_path: "./data/vision_memory"

# Semantic Search (RAG)
rag:
  enabled: true
  vector_db: "chromadb"  # chromadb or lancedb
  index_path: "./data/vector_db"
  chunk_size: 500
  chunk_overlap: 50
  embedding_model: "all-MiniLM-L6-v2"

# Screen Overlay HUD
hud:
  enabled: false
  transparency: 0.7
  highlight_color: "#00ff00"
  show_click_targets: true
  show_mouse_trail: false

# Proactive Suggestions
proactive:
  enabled: false
  interval_seconds: 60
  max_suggestions: 3

# Voice Emotional Analysis
emotion:
  enabled: true
  sensitivity: 0.5
  adjust_tone: true

# Cross-Device Handover
cross_device:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  discord:
    enabled: false
    bot_token: ""
    channel_id: ""

# VS Code Integration
vscode:
  bridge_enabled: false
  port: 8080
  auto_connect: false

# Gmail Integration
gmail:
  enabled: false
  credentials_path: "./config/gmail_credentials.json"
  token_path: "./config/gmail_token.json"

# Google Calendar Integration
calendar:
  enabled: true
  credentials_path: "./config/gmail_credentials.json"
  token_path: "./config/calendar_token.json"

# Daily Briefing
briefing:
  enabled: false
  morning_time: "08:00"
  evening_time: "21:00"
  include_weather: true
  include_calendar: true
  include_email: true
  include_reminders: true
  cross_device_push: false

# Spotify Integration
spotify:
  enabled: false
  client_id: ""
  client_secret: ""
  redirect_uri: "http://localhost:8888/callback"

# Session Persistence
session:
  enabled: true
  max_messages: 30
  max_tool_results: 10

# Obsidian Vault Integration
obsidian:
  enabled: true
  vault_path: "~/Obsidian/Jarvis"

# System Settings
system:
  stealth_mode: false
  log_level: "INFO"
  max_memory_mb: 512

# Security & Safety Settings
security:
  permission_profile: "normal"        # safe | normal | admin
  allow_destructive_actions: true   # global override for destructive file/command operations
  mcp_enabled: true                  # enables loading MCP servers on boot
  confirmation_medium_risk: true     # require confirmation for medium-risk actions
  confirmation_high_risk: true      # require confirmation for high-risk actions
  disabled_actions: []               # list of actions to disable (e.g., ["delete", "shutdown"])
  action_history_enabled: true      # enable persistent action history
  action_history_max_size: 1000     # maximum number of history entries to keep

# Performance & Monitoring Settings
performance:
  enabled: true                      # enable performance monitoring
  track_tool_executions: true        # track tool execution times
  track_latency: true                # track detailed latency breakdown
  slow_operation_threshold_ms: 2000  # threshold for slow operation detection
  alert_threshold_ms: 5000           # threshold for performance alerts
  max_history_size: 1000             # maximum performance history entries
  resource_monitoring: true          # enable resource monitoring (CPU, RAM, etc.)
  resource_interval_seconds: 60       # interval between resource snapshots
  cache_enabled: true                # enable caching system
  cache_ttl_hours: 24                # default cache time-to-live in hours
  background_tasks_enabled: true      # enable background task processing
  background_workers: 4              # number of background worker threads
  status_update_interval_ms: 500     # interval for status updates (ms)
  # Performance Optimization Feature Flags
  flags:
    # Phase 1: Quick Wins
    cache_system_prompt: true         # Cache system prompt with 5-min TTL
    lazy_tool_declarations: true      # Lazy load tool declarations
    optimized_audio_chunks: true      # Use 4096-byte chunks with double buffering
    cache_api_responses: true         # Cache API responses with 10-min TTL
    preload_embedding_model: true     # Preload embedding model at startup
    debounce_ui_updates: true         # Debounce UI updates to 1s interval
    async_logging: true               # Use async logging with queue
    # Phase 2: Medium-Impact
    lazy_load_actions: true           # Lazy load action modules
    connection_pooling: true          # Use connection pooling for external APIs
    aggressive_compression: true      # Aggressive compression for old messages
    db_connection_pooling: true       # Use connection pooling for databases
    vector_db_cache: true            # Cache vector DB queries with 1-hour TTL
    batch_screen_processing: true      # Batch process screen captures
    event_file_watching: true        # Use event-based file watching
    # Phase 3: Complex Changes
    reduce_memory_footprint: true     # Implement state sharding and GC
    parallel_tool_execution: true     # Execute independent tools in parallel
    async_workflow_engine: true      # Use async task queue for workflows
    precompute_queries: true         # Precompute common queries
    response_streaming: true         # Stream API responses
    async_ui_server: true            # Use aiohttp for UI server

# Workflow & Orchestration Settings
workflow:
  enabled: true                      # enable workflow engine
  max_concurrent_workflows: 2        # maximum workflows running concurrently
  persistence_enabled: true          # enable workflow persistence
  persistence_dir: "./data/workflows"  # directory for workflow storage
  auto_cleanup_hours: 168            # auto-cleanup old workflows after hours (7 days)
  default_priority: "normal"         # default workflow priority (low, normal, high, urgent)
  default_max_retries: 3             # default max retries for failed workflows
  step_timeout_seconds: 300           # timeout for individual steps (5 minutes)
  require_confirmation_high_risk: true  # require confirmation for high-risk steps

# Local Analysis & Multimodal Settings
local_analysis:
  enabled: true                      # enable local file and image analysis
  cache_results: true                 # cache analysis results
  max_cache_size: 1000               # maximum cache entries
  supported_image_formats: ["png", "jpg", "jpeg", "webp", "bmp", "gif"]
  supported_document_formats: ["pdf", "txt", "md", "docx", "doc", "rtf"]
  analysis_timeout_seconds: 30        # timeout for analysis operations

# Skin Analysis Settings
skin_analysis:
  enabled: true                      # enable skin analysis feature
  conservative_mode: true            # use conservative, non-diagnostic language
  require_disclaimer: true           # always include medical disclaimer
  care_suggestions_enabled: true      # provide general care suggestions
  dermatologist_referral_threshold: "high"  # when to suggest dermatologist (low, medium, high)

# Morning Routine Settings
morning_routine:
  enabled: false                     # enable morning routine (disabled by default)
  mode: "manual"                     # off, manual, semi_automatic, full_automatic
  reminder_time: "08:00"             # daily reminder time (HH:MM)
  reminder_window_minutes: 60        # window for reminder
  photo_directory: ""                # directory to watch for photos (empty = manual upload)
  auto_analyze: true                 # automatically analyze submitted photos
  send_reminder_if_missed: true      # send follow-up reminder if photo missed
  reminder_delay_minutes: 120        # delay for follow-up reminder (2 hours)
  quiet_hours_start: "22:00"         # start of quiet hours
  quiet_hours_end: "07:00"           # end of quiet hours

# Memory & Retrieval Settings
memory_retrieval:
  enabled: true                      # enable hybrid retrieval
  semantic_weight: 0.4               # weight for semantic similarity
  keyword_weight: 0.3                # weight for keyword matching
  time_weight: 0.2                  # weight for recency
  confidence_weight: 0.1             # weight for confidence score
  max_results: 10                   # maximum retrieval results
  min_relevance_threshold: 0.3       # minimum relevance threshold
  conflict_detection: true           # detect conflicting memories
  auto_update_access_count: true     # update access count on retrieval

# Proactive Suggestions Settings
proactive:
  enabled: false                     # enable proactive suggestions (disabled by default)
  mode: "normal"                     # off, subtle, normal, active
  interval_seconds: 60              # interval between suggestion checks
  max_suggestions: 3                 # maximum suggestions to show
  cooldown_minutes: 30               # cooldown before repeating same suggestion
  speak_high_priority: true          # speak high-priority suggestions
  track_files: true                  # track file interactions for suggestions
  track_images: true                 # track image interactions for suggestions

# Paths
paths:
  base_dir: "."  # Auto-detected if not specified
  config_dir: "./config"
  data_dir: "./data"
  plugins_dir: "./plugins"
  logs_dir: "./logs"
