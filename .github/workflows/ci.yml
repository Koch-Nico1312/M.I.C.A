name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio pytest-mock pytest-benchmark
    
    - name: Run tests with coverage
      run: |
        pytest --cov=core --cov=actions --cov=memory --cov=config --cov=tests \
              --cov-report=xml --cov-report=html --cov-report=term \
              --cov-fail-under=70 \
              -v
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
    
    - name: Run linting
      run: |
        pip install flake8 mypy black isort bandit
        flake8 core actions memory config tests --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check core actions memory config tests
        isort --check-only core actions memory config tests
        bandit -r core actions memory config
    
    - name: Run security scan
      run: |
        pip install safety
        safety check --full-report

  performance:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-benchmark
    
    - name: Run performance benchmarks
      run: |
        pytest tests/benchmarks/ --benchmark-only --benchmark-json=benchmark_results.json
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark_results.json

  ui-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: UI/package-lock.json

    - name: Install UI dependencies
      working-directory: UI
      run: npm ci

    - name: Typecheck UI
      working-directory: UI
      run: npx tsc --noEmit

    - name: Build UI
      working-directory: UI
      run: npx vite build

  release-smoke:
    runs-on: ubuntu-latest
    needs: [test, ui-build]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: UI/package-lock.json

    - name: Build UI assets
      working-directory: UI
      run: |
        npm ci
        npx vite build

    - name: Build release archive
      run: python scripts/build_release.py --version ci --clean

    - name: Upload release smoke artifact
      uses: actions/upload-artifact@v4
      with:
        name: jarvis-release-smoke
        path: |
          dist/jarvis-ci.zip
          dist/jarvis-ci.manifest.json
