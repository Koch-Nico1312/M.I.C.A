<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>M.I.C.A Companion</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <strong>M.I.C.A</strong>
        <span id="status">Checking</span>
      </header>
      <section class="panel">
        <div class="row">
          <input id="pairing-code" inputmode="numeric" placeholder="Pairing-Code">
          <button id="pair">Koppeln</button>
        </div>
        <div id="session">Nicht gekoppelt</div>
      </section>
      <section class="panel">
        <div class="row">
          <button id="refresh">Arbeitsbereich</button>
          <button id="terminal">Git status</button>
        </div>
        <pre id="workspace"></pre>
      </section>
      <textarea id="message" rows="5" placeholder="Nachricht oder Aufgabe an M.I.C.A"></textarea>
      <button id="send">An M.I.C.A senden</button>
      <pre id="output"></pre>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
