[pytest]
# Pytest configuration for JARVIS AI Assistant

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests
pythonpath = .

# Coverage configuration
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=core
    --cov=actions
    --cov=memory
    --cov=config
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    # Maintained-suite baseline; raise as migrated legacy modules regain coverage.
    --cov-fail-under=35

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may use external resources)
    performance: Performance benchmarks
    security: Security tests
    slow: Slow running tests
    requires_api: Tests that require API keys
    requires_browser: Tests that require browser automation
    requires_audio: Tests that require audio hardware

# Minimum Python version
minversion = 7.0

# Async test support
asyncio_mode = auto

# Warnings configuration
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
