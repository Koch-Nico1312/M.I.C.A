version: '3.8'

services:
  jarvis:
    build: .
    container_name: jarvis-assistant
    restart: unless-stopped
    volumes:
      # Mount configuration
      - ./config:/app/config
      # Mount data directories for persistence
      - ./data:/app/data
      # Mount logs
      - ./logs:/app/logs
      # Mount memory
      - ./memory:/app/memory
      # Mount plugins
      - ./plugins:/app/plugins
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONUTF8=1
      # Add your API keys here or use .env file
      # - GEMINI_API_KEY=your_api_key_here
    devices:
      # Add audio device access if needed (Linux only)
      # - /dev/snd:/dev/snd
    ports:
      - "8080:8080"
    networks:
      - jarvis-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; import os; sys.exit(0 if os.path.exists('main.py') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Ollama for local LLM fallback
  ollama:
    image: ollama/ollama:latest
    container_name: jarvis-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - jarvis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - with-ollama

networks:
  jarvis-network:
    driver: bridge

volumes:
  ollama_data:
    driver: local
